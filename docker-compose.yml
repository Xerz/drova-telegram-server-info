services:
  drova-bot:
    container_name: drova-bot
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/drova_bot.sqlite3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Yekaterinburg}
      DROVA_BASE_URL: ${DROVA_BASE_URL:-https://services.drova.io}
    volumes:
      - ./data:/data
