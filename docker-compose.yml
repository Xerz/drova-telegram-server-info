services:
  bot:
    build: .
    depends_on:
      - xray
    env_file:
      - .env
    environment:
      HTTP_PROXY: http://xray:10808
      HTTPS_PROXY: http://xray:10808
    volumes:
      - ./:/app
    restart: unless-stopped
  xray:
    image: teddysun/xray:26.2.6
    expose:
      - "10808"
    volumes:
      - ./xray-config:/etc/xray:ro
    restart: unless-stopped
